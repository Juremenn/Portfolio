<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nel - Link Portofolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="profile-image">
                <img src="../profile/cat.jpg" alt="Profile Picture">
            </div>
            <h1 class="name">Nirvana</h1>
            <p class="username">@vanlwl</p>
            <p class="quote" id="typed-quote" data-text="Love you hurt? you strong made by your hurt!"></p>
        </div>

        <div class="links-section">
            <a href="/home" class="link-card" data-aos="fade-up" data-aos-delay="100">
                <i class="fas fa-book icon-book"></i>
                <span>Portfolio</span>
            </a>

            <a href="https://github.com/naelxploit/certificates" class="link-card" data-aos="fade-up" data-aos-delay="300">
                <i class="fas fa-medal icon-cert"></i>
                <span>Certificates</span>
            </a>

            <a href="https://github.com/juremenn" class="link-card" data-aos="fade-up" data-aos-delay="200">
                <i class="fab fa-github icon-github"></i>
                <span>GitHub</span>
            </a>

            <a href="https://t.me/GwSonel" class="link-card" data-aos="fade-up" data-aos-delay="400">
                <i class="fab fa-telegram icon-telegram"></i>
                <span>Telegram</span>
            </a>
        </div>

    </div>

    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        if (window.particlesJS) {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 65, density: { enable: true, value_area: 950 } },
                    color: { value: ['#7d1eff', '#5f12ca'] },
                    shape: { type: 'circle' },
                    opacity: { value: 0.7, random: true },
                    size: { value: 2.7, random: true },
                    line_linked: {
                        enable: true,
                        distance: 140,
                        color: '#7d1eff',
                        opacity: 0.32,
                        width: 1.2
                    },
                    move: {
                        enable: true,
                        speed: 1.1,
                        direction: 'none',
                        random: true,
                        straight: false,
                        out_mode: 'out',
                        bounce: false
                    }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: {
                        onhover: { enable: false, mode: 'grab' },
                        onclick: { enable: true, mode: 'push' },
                        resize: true
                    },
                    modes: {
                        grab: { distance: 140, line_linked: { opacity: 0.35 } },
                        push: { particles_nb: 3 }
                    }
                },
                retina_detect: true
            });
        }

        const quoteElement = document.getElementById('typed-quote');
        if (quoteElement) {
            const text = quoteElement.getAttribute('data-text') || '';
            let i = 0;
            const typingSpeed = 46;

            function typeQuote() {
                if (i <= text.length) {
                    quoteElement.textContent = text.slice(0, i);
                    i += 1;
                    setTimeout(typeQuote, typingSpeed);
                }
            }

            typeQuote();
        }
    </script>
</body>
</html>
